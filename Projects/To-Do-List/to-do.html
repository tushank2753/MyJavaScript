<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><span>Focus Today</span> Work</h1>
        <div class="card">
            <h3>Today <i class="fa-solid fa-sun" style="color: rgb(255, 212, 59);"></i></h3>
            <p>Raise the bar by completing your goals</p>
            <div class="main-progressbar">
                <div class="progressbar"></div>
            </div>
            <div class="task-container">
                <div class="box"><input type="checkbox" id="check" class="checkmark"><input type="text" name="" class="addgoal" id="addTask" placeholder="Add new goal"></div>
                <div class="box"><input type="checkbox" id="check" class="checkmark"><input type="text" name="" class="addgoal" id="addTask" placeholder="Add new goal"></div>
                <div class="box"><input type="checkbox" id="check" class="checkmark"><input type="text" name="" class="addgoal" id="addTask" placeholder="Add new goal"></div>
                <div class="box"><input type="checkbox" id="check" class="checkmark"><input type="text" name="" class="addgoal" id="addTask" placeholder="Add new goal"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
